<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Title Here</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Fonts - Add this line -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Your CSS - Keep this line -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🛍️ E-<span>Shop</span></div>
        <div>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="orders.html">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>Checkout</h1>
        <div class="checkout-form">
            <div class="form-group">
                <label>Street Address</label>
                <input type="text" id="street" required>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" required>
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" id="state" required>
            </div>
            <div class="form-group">
                <label>Zip Code</label>
                <input type="text" id="zip" required>
            </div>
            <div class="form-group">
                <label>Country</label>
                <input type="text" id="country" value="USA" required>
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="payment">
                    <option>Credit Card</option>
                    <option>PayPal</option>
                    <option>Cash on Delivery</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="placeOrder()" style="width:100%">Place Order</button>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 E-Shop | Developed for <strong>CodeAlpha</strong> Internship</p>
    </footer>

    <script>
    const API_URL = 'http://localhost:5000/api';
    const token = localStorage.getItem('token');
    
    if (!token) {
        window.location.href = 'login.html';
    }

    // Show toast notification
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast-notification ${type}`;
        const icon = type === 'success' ? '✓' : '✗';
        toast.innerHTML = `${icon} ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function placeOrder() {
        // Validate required fields
        const street = document.getElementById('street').value;
        const city = document.getElementById('city').value;
        const state = document.getElementById('state').value;
        const zipCode = document.getElementById('zip').value;
        
        if (!street || !city || !state || !zipCode) {
            showToast('Please fill all address fields', 'error');
            return;
        }
        
        const orderData = {
            shippingAddress: {
                street: street,
                city: city,
                state: state,
                zipCode: zipCode,
                country: document.getElementById('country').value
            },
            paymentMethod: document.getElementById('payment').value
        };
        
        try {
            const response = await fetch(`${API_URL}/orders`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(orderData)
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showToast('Order placed successfully! 🎉', 'success');
                setTimeout(() => {
                    window.location.href = 'orders.html';
                }, 1500);
            } else {
                showToast(data.message || 'Order failed', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('Error placing order', 'error');
        }
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
