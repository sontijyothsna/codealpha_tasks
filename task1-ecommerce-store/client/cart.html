<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | E-Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🛍️ E-<span>Shop</span></div>
        <div>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="orders.html">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>Shopping Cart</h1>
        <div id="cart-container"></div>
    </div>

    <footer class="footer">
        <p>© 2026 E-Shop | Developed for <strong>CodeAlpha</strong> Internship</p>
    </footer>

    <script>
    const API_URL = 'http://localhost:5000/api';
    const token = localStorage.getItem('token');
    
    if (!token) {
        window.location.href = 'login.html';
    }

    // Show toast notification
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast-notification ${type}`;
        const icon = type === 'success' ? '✓' : '✗';
        toast.innerHTML = `${icon} ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadCart() {
        try {
            const response = await fetch(`${API_URL}/cart`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const cart = await response.json();
            
            const container = document.getElementById('cart-container');
            
            if (!cart.items || cart.items.length === 0) {
                container.innerHTML = '<p>Your cart is empty. <a href="index.html">Continue Shopping</a></p>';
                document.getElementById('cart-count').innerText = '0';
                localStorage.setItem('cartCount', '0');
                return;
            }
            
            let total = 0;
            let itemsHtml = '';
            
            for (let item of cart.items) {
                const product = item.product;
                const itemTotal = product.price * item.quantity;
                total += itemTotal;
                
                itemsHtml += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${product.name}</div>
                            <div class="cart-item-price">$${product.price} each</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="updateQuantity('${product._id}', ${item.quantity - 1})">-</button>
                            <input type="number" value="${item.quantity}" id="qty-${product._id}" min="1" style="width:60px; text-align:center;" onchange="updateQuantity('${product._id}', parseInt(this.value))">
                            <button onclick="updateQuantity('${product._id}', ${item.quantity + 1})">+</button>
                        </div>
                        <div style="min-width:100px; text-align:right;">
                            <strong>$${itemTotal.toFixed(2)}</strong>
                        </div>
                        <button class="btn" onclick="removeItem('${product._id}')" style="background:#dc3545;">Remove</button>
                    </div>
                `;
            }
            
            container.innerHTML = `
                ${itemsHtml}
                <div class="cart-total">
                    <h3>Total: $${total.toFixed(2)}</h3>
                    <button class="btn btn-primary" onclick="checkout()">Proceed to Checkout</button>
                    <button class="btn" onclick="clearCart()">Clear Cart</button>
                </div>
            `;
            
            const count = cart.items.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;
            localStorage.setItem('cartCount', count);
            
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('cart-container').innerHTML = '<p>Error loading cart</p>';
        }
    }

    async function updateQuantity(productId, newQuantity) {
        if (newQuantity < 1) return;
        
        try {
            const response = await fetch(`${API_URL}/cart/item`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ productId, quantity: newQuantity })
            });
            
            if (response.ok) {
                showToast('Quantity updated', 'success');
                await loadCart();
                await updateCartCount();
            } else {
                showToast('Failed to update quantity', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('Error updating quantity', 'error');
        }
    }

    async function removeItem(productId) {
        try {
            const response = await fetch(`${API_URL}/cart/item/${productId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                showToast('Item removed from cart', 'success');
                await loadCart();
                await updateCartCount();
            } else {
                showToast('Failed to remove item', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('Error removing item', 'error');
        }
    }

    async function clearCart() {
    try {
        const response = await fetch(`${API_URL}/cart`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
            showToast('Cart cleared successfully!', 'success');
            await loadCart();
            await updateCartCount();
        } else {
            showToast('Failed to clear cart', 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showToast('Error clearing cart', 'error');
    }
}

    async function updateCartCount() {
        try {
            const response = await fetch(`${API_URL}/cart`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const cart = await response.json();
            const count = cart.items ? cart.items.reduce((sum, item) => sum + item.quantity, 0) : 0;
            const countElement = document.getElementById('cart-count');
            if (countElement) countElement.innerText = count;
            localStorage.setItem('cartCount', count);
        } catch (error) {
            console.error('Error updating cart count:', error);
        }
    }

    function checkout() {
        window.location.href = 'checkout.html';
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('cartCount');
        window.location.href = 'login.html';
    }

    loadCart();
</script>

</body>
</html>
